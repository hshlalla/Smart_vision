[build-system]
requires = ["setuptools>=80.3.1", "wheel>=0.45.1"]
build-backend = "setuptools.build_meta"

[project]
name = "smart-match-model"
version = "1.0.0"
description = "Machine learning models for Smart Vision platform"
readme = "README.md"
requires-python = ">=3.10"
license = {file = "LICENSE"}
authors = [
    {name = "suhun.hong"}
]
dependencies = [
    "PyYAML>=6.0.2",
    "anytree>=2.13.0",
    "chardet<6",
    "imbalanced-learn>=0.13.0",
    "lightning>=2.5.1",
    "numpy>=1.26,<2",
    "openpyxl>=3.1.5",
    "pandas>=2.2.3",
    "safetensors>=0.5.3",
    "scikit-learn>=1.6.1",
    "torch>=2.8.0,<2.9.0; platform_system != 'Darwin' or platform_machine != 'x86_64'",
    "torchvision>=0.23.0,<0.24.0; platform_system != 'Darwin' or platform_machine != 'x86_64'",
    "transformers>=4.57.1,<5.0.0",
    "qwen-vl-utils>=0.0.14",
    "paddleocr[doc-parser]>=3.4.0,<3.5.0",
    "paddlex>=3.4.2,<3.5.0",
    "paddlepaddle-gpu>=3.1.0,<3.2.0; platform_system == 'Linux'",
    "paddlepaddle>=3.1.0,<3.2.0; platform_system == 'Darwin' and platform_machine == 'arm64'",
    "paddlepaddle>=3.0.0,<3.1.0; platform_system == 'Darwin' and platform_machine == 'x86_64'",
    "paddlepaddle>=3.1.0,<3.2.0; platform_system == 'Windows'",
    "langchain>=0.3,<0.4",
    "langchain-community>=0.3,<0.4",
    "pymilvus>=2.4.9",
    "Pillow>=11.0.0",
    "huggingface-hub>=0.26.2"
]

[project.optional-dependencies]
dev = [
    "black>=25.1.0",
    "flake8>=7.2.0",
    "pytest>=8.3.5"
]
gpt = [
    "openai>=2.0.0"
]

[tool.setuptools.package-data]
smart_match = ["*.json"]

[tool.setuptools.packages.find]
include = ["smart_match*"]

[tool.black]
line-length = 88
target-version = ["py312"]
